upstream django_app {
    server web:8000;
}

server {
    listen 80;
    server_name mtrznadel.me www.mtrznadel.me tickets.mtrznadel.me;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name mtrznadel.me www.mtrznadel.me tickets.mtrznadel.me;

    ssl_certificate /etc/letsencrypt/live/mtrznadel.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mtrznadel.me/privkey.pem;

    location /static/ {
        alias /app/static/;
    }

    location /media/ {
        alias /app/media/;
    }

    location / {
        proxy_pass http://django_app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}