services:
  nginx:
    build: ./nginx
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    depends_on:
      - web
    restart: always

  certbot:
    image: certbot/certbot
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'" # Automatic renewal every 12h. Disable this only for initial certificate generation.

  db:
    image: postgres:15-alpine
    container_name: db
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    env_file:
      - .env.prod
    restart: always

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always

  web:
    build: .
    container_name: web
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3
    env_file:
      - .env.prod
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    depends_on:
      - db
      - redis
    restart: always

  celery_worker:
    build: .
    container_name: celery_worker
    command: celery -A config worker --loglevel=info
    env_file:
      - .env.prod
    depends_on:
      - db
      - redis
      - web
    restart: always

  celery_beat:
    build: .
    container_name: celery_beat
    command: celery -A config beat --loglevel=info
    env_file:
      - .env.prod
    depends_on:
      - db
      - redis
      - web
    restart: always

volumes:
  postgres_data_prod:
  static_volume:
  media_volume: