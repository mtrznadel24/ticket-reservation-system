<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}System Biletowy{% endblock %}</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootswatch/5.3.3/zephyr/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body { background-color: #f8f9fa; }
    </style>
</head>
<body>
    <header class="sticky-top">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm py-3">
            <div class="container">
                <a class="navbar-brand fw-bold" href="{% url 'home' %}">
                    <i class="bi bi-ticket-detailed me-2"></i>My Tickets
                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Przełącz nawigację">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'events' %}">
                                <i class="bi bi-house-door me-1"></i> Events
                            </a>
                        </li>

                        {% if user.is_authenticated %}
                            <li class="nav-item">
                                <a class="nav-link" href="{% url 'cart' %}">
                                    <i class="bi bi-cart3 me-1"></i> Cart
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="{% url 'my_tickets' %}">
                                    <i class="bi bi-qr-code-scan me-1"></i> My Tickets
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="{% url 'my_orders' %}">
                                    <i class="bi bi-receipt me-1"></i> Orders
                                </a>
                            </li>
                        {% endif %}
                    </ul>

                    <div class="d-flex align-items-center">
                        {% if user.is_authenticated %}
                            <span class="text-light me-3 small">
                                Hello, <strong class="text-warning">{{ user.username }}</strong>
                            </span>
                            <form method="post" action="{% url 'logout' %}" class="m-0">
                                {% csrf_token %}
                                <button type="submit" class="btn btn-sm btn-danger fw-bold shadow-sm">
                                    <i class="bi bi-box-arrow-right me-1"></i> Logout
                                </button>
                            </form>
                        {% else %}
                            <a href="{% url 'login' %}" class="btn btn-light fw-bold me-2 shadow-sm">Login</a>
                            <a href="{% url 'register' %}" class="btn btn-primary fw-bold shadow-sm">Register</a>
                        {% endif %}
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main class="container py-4">
        {% block content %}
        {% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
